name: Continuous Architecture Compliance

on:
  workflow_call:
    inputs:
      manifest_file:
        description: Ruta del manifiesto relativa al checkout del repositorio de gobernanza.
        required: false
        type: string
        default: "rules/manifest.yaml"
    outputs:
      status:
        description: Estado consolidado.
        value: ${{ jobs.execute_rules.outputs.status }}
      response:
        description: Respuesta consolidada en formato JSON.
        value: ${{ jobs.execute_rules.outputs.response }}

jobs:
  execute_rules:
    name: Validar cumplimiento
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      response: ${{ steps.validate.outputs.response }}

    steps:
      - name: Checkout del consumidor
        uses: actions/checkout@v4

      - name: Checkout de gobernanza
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - name: Instalar dependencias del linter
        shell: bash
        working-directory: governance
        run: npm ci

      - id: run_engine
        name: Ejecutar linter
        shell: bash
        env:
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          response="$(node governance/src/engine.mjs --mode validate --repo-root "$GITHUB_WORKSPACE" --manifest "governance/$MANIFEST_FILE")"
          status="$(node -e "const response = JSON.parse(process.argv[1]); process.stdout.write(response.status || 'FAIL');" "$response")"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'response<<EOF\n%s\nEOF\n' "$response" >> "$GITHUB_OUTPUT"
          if [ "$status" != "PASS" ]; then exit 1; fi

  publish-summary:
    name: Publicar reporte
    needs:
      - execute_rules
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout de gobernanza
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - name: Instalar dependencias del linter
        shell: bash
        working-directory: governance
        run: npm ci

      - name: Mostrar reporte consolidado
        shell: bash
        run: |
          status="$(VALIDATION_RESPONSE="$VALIDATION_RESPONSE" node governance/src/engine.mjs --mode summary)"
          if [ "$status" != "PASS" ]; then exit 1; fi
        env:
          VALIDATION_RESPONSE: ${{ needs.execute_rules.outputs.response }}
