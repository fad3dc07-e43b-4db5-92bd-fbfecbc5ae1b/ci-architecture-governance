name: Continuous Architecture Compliance

on:
  workflow_call:
    inputs:
      manifest_file:
        description: Ruta del manifiesto relativa al checkout del repositorio de gobernanza.
        required: false
        type: string
        default: "specs/manifest.yaml"
    outputs:
      status:
        description: Estado consolidado.
        value: ${{ jobs.execute_rules.outputs.status }}
      response:
        description: Respuesta consolidada en formato JSON.
        value: ${{ jobs.execute_rules.outputs.response }}

jobs:
  execute_rules:
    name: Validar
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout del consumidor
        uses: actions/checkout@v4

      - name: Checkout de gobernanza
        uses: actions/checkout@v4
        with:
          repository: ContinuousArchitecture/CALinter
          path: governance

      - name: Instalar dependencias del linter
        shell: bash
        working-directory: governance
        run: npm ci

      - id: validate
        name: Ejecutar linter
        shell: bash
        env:
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          response="$(node governance/src/engine.mjs --mode validate --repo-root "$GITHUB_WORKSPACE" --manifest "governance/$MANIFEST_FILE")"
          status="$(node -e "const response = JSON.parse(process.argv[1]); process.stdout.write(response.status || 'ERROR');" "$response")"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'response<<EOF\n%s\nEOF\n' "$response" >> "$GITHUB_OUTPUT"
          if [ "$status" = "FAIL" ] || [ "$status" = "ERROR" ]; then exit 1; fi

      - name: Publicar resumen
        if: always()
        shell: bash
        env:
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          node governance/src/engine.mjs --mode summary --repo-root "$GITHUB_WORKSPACE" --manifest "governance/$MANIFEST_FILE"
