name: Validate Rule Manifest

on:
  workflow_call:
    inputs:
      manifest_file:
        description: Path to the validator manifest relative to the governance repository checkout.
        required: false
        type: string
        default: "rules/manifest.yaml"
    outputs:
      status:
        description: Combined validation status.
        value: ${{ jobs.validate.outputs.status }}
      report:
        description: Combined validation report as JSON.
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      report: ${{ steps.validate.outputs.report }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout governance repository
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - id: validate
        name: Run manifest validators
        shell: bash
        env:
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          report_file="$RUNNER_TEMP/governance-validation-report.json"
          status="$(node governance/linter-engine.mjs --repo-root "$GITHUB_WORKSPACE" --manifest "governance/$MANIFEST_FILE" --report-file "$report_file")"
          report="$(cat "$report_file")"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'report<<EOF\n%s\nEOF\n' "$report" >> "$GITHUB_OUTPUT"
          if [ "$status" != "PASS" ]; then exit 1; fi
