id: archi-archimate-source
title: Fuente Archi ArchiMate
description: Valida una fuente editada con Archi y compatible con ArchiMate.
checks:
  - id: source-folder
    type: path
    path: artifact/source
    kind: dir
    message: La carpeta artifact/source debe existir.
  - id: single-design-file
    type: single-visible-file
    path: artifact/source
    name: design.archimate
    message: artifact/source debe contener solo design.archimate.
  - id: non-empty-file
    type: file-not-empty
    path: artifact/source/design.archimate
    message: design.archimate no puede estar vacío.
  - id: archimate-root
    type: xml-root
    path: artifact/source/design.archimate
    root: archimate:model
    message: design.archimate debe iniciar con la raíz archimate:model.
  - id: archimate-namespace
    type: text-contains
    path: artifact/source/design.archimate
    text: xmlns:archimate="http://www.archimatetool.com/archimate"
    message: design.archimate debe incluir el namespace de Archi.
  - id: xsi-namespace
    type: text-contains
    path: artifact/source/design.archimate
    text: xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    message: design.archimate debe incluir el namespace xsi.
